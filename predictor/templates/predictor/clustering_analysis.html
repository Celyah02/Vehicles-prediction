<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Segmentation - Vehicle Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand { font-weight: bold; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
        .btn-primary { background-color: #0d6efd; border-color: #0d6efd; }
        .btn-primary:hover { background-color: #0b5ed7; border-color: #0b5ed7; }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Vehicle Analytics</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'home' %}">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white py-3">
                        <h6 class="mb-0 fw-bold">Customer Segmentation Model</h6>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST" action="">
                            {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold small">Model Year</label>
                                    <input type="number" name="year" class="form-control" placeholder="2022" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold small">Kilometers Driven</label>
                                    <input type="number" step="any" name="km" class="form-control" placeholder="15000" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold small">Seats</label>
                                    <input type="number" name="seats" class="form-control" placeholder="5" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold small">Owner Annual Income</label>
                                    <input type="number" step="any" name="income" class="form-control" placeholder="50000" required>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Run Combined Inference</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white py-3">
                        <h6 class="mb-0 fw-bold">Dual-Model Result</h6>
                    </div>
                    <div class="card-body d-flex flex-column align-items-center justify-content-center text-center p-4">
                        {% if price %}
                        <div class="mb-4">
                            <small class="text-muted text-uppercase fw-bold ls-wide">Estimated Value</small>
                            <h2 class="display-4 fw-bold text-primary mb-0">${{ price|floatformat:2 }}</h2>
                        </div>
                        <hr class="w-75 my-3 opacity-10">
                        <div class="mt-2">
                            <small class="text-muted text-uppercase fw-bold ls-wide">Client Cluster</small>
                            <div class="mt-2">
                                <span class="badge rounded-pill bg-success px-4 py-2 fs-6">
                                    {{ prediction }}
                                </span>
                            </div>
                        </div>
                        {% else %}
                        <div class="py-5">
                            <div class="text-muted mb-3 opacity-25">Waiting</div>
                            <p class="text-secondary">Awaiting input to generate prediction and customer profile.</p>
                        </div>
                        {% endif %}
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
